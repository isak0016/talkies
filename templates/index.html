<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkies - Stream Movies & TV Shows</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <header>
        <div class="logo">🎬 Talkies</div>
        <nav>
            <a href="/">Home</a>
            <a href="/movies">Movies</a>
            <a href="/tv">TV Shows</a>
        </nav>
    </header>
    
    <div class="hero">
        <h1>Unlimited Movies, TV Shows, and More</h1>
        <a href="/movies" class="btn">Start Watching</a>
    </div>
    
    <div class="content"></div>
    
    <footer>
        <p>&copy; 2026 Talkies. All rights reserved.</p>
    </footer>

    <script>
        fetch('/api/movies/popular')
            .then(response => response.json())
            .then(data => {
                const trendingSection = document.createElement('section');
                trendingSection.className = 'trending';
                trendingSection.innerHTML = '<h2>Trending Now</h2><div class="trending-grid"></div>';
                document.querySelector('.content').appendChild(trendingSection);
                
                const grid = trendingSection.querySelector('.trending-grid');
                data.forEach(item => {
                    const posterUrl = item.poster_path 
                        ? `https://image.tmdb.org/t/p/w500${item.poster_path}` 
                        : '/static/placeholder.jpg';
                    const title = item.title || item.name || 'Untitled';
                    const year = item.release_date 
                        ? new Date(item.release_date).getFullYear() 
                        : 'N/A';
                    const card = document.createElement('a');
                    card.className = 'trending-card';
                    card.href = `/movieplayer/movie/${item.id}`;
                    card.innerHTML = `
                        <img src="${posterUrl}" alt="${title}" class="poster">
                        <div class="movie-info">
                            <h3>${title}</h3>
                            <div class="year">${year}</div>
                            <p class="overview">${item.overview || 'No description available.'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
