<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search movies..." required>
        <button id="search-button">Search</button>
    </div>

    <div class="filters">
        <select id="genre-filter">
            <option value="">All Genres</option>
            <option value="28">Action</option>
            <option value="12">Adventure</option>
            <option value="16">Animation</option>
            <option value="35">Comedy</option>
            <option value="80">Crime</option>
            <option value="99">Documentary</option>
            <option value="18">Drama</option>
            <option value="10751">Family</option>
            <option value="14">Fantasy</option>
            <option value="36">History</option>
            <option value="27">Horror</option>
            <option value="10402">Music</option>
            <option value="9648">Mystery</option>
            <option value="10749">Romance</option>
            <option value="878">Science Fiction</option>
            <option value="10770">TV Movie</option>
            <option value="53">Thriller</option>
            <option value="10752">War</option>
            <option value="37">Western</option>
        </select>

        <select id="decade-filter">
            <option value="">All Decades</option>
            <option value="2020">2020s</option>
            <option value="2010">2010s</option>
            <option value="2000">2000s</option>
            <option value="1990">1990s</option>
            <option value="1980">1980s</option>
            <option value="1970">1970s</option>
            <option value="1960">1960s</option>
            <option value="1950">1950s</option>
        </select>
        <div class="rating-filter">
            <div class="rating-value" id="rating-display">Rating: 0 – 10</div>
            <div class="rating-track" id="rating-track">
                <div class="rating-fill" id="rating-fill"></div>
                <input type="range" id="rating-min" min="0" max="10" step="0.5" value="0">
                <input type="range" id="rating-max" min="0" max="10" step="0.5" value="10">
            </div>
                <div class="rating-labels"><span>0</span><span>5</span><span>10</span></div>
        </div>
    </div>
    
    <div id="movies-grid" class="movies-grid"></div>

    <script>
        function resetFilters() {
            document.getElementById('genre-filter').value = '';
            document.getElementById('decade-filter').value = '';
            document.getElementById('rating-min').value = 0;
            document.getElementById('rating-max').value = 10;
            updateSlider();
        }

        function fetchMovies(fromSearch = false) {
            const query = document.getElementById('search-input').value.trim();
            const genre = document.getElementById('genre-filter').value;
            const decade = document.getElementById('decade-filter').value;
            const ratingMin = document.getElementById('rating-min').value;
            const ratingMax = document.getElementById('rating-max').value;

            if (query) {
                if (fromSearch) resetFilters();
                fetch(`/api/search/movie?q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(data => renderMovies(filterLocally(data, genre, decade, ratingMin, ratingMax)))
                    .catch(console.error);
            } else if (genre || decade || ratingMin > 0 || ratingMax < 10) {
                const params = new URLSearchParams();
                if (genre) params.append('genre', genre);
                if (decade) params.append('decade', decade);
                params.append('rating_min', ratingMin);
                params.append('rating_max', ratingMax);
                fetch(`/api/movies/discover?${params}`)
                    .then(r => r.json())
                    .then(renderMovies)
                    .catch(console.error);
            }
        }

        function filterLocally(movies, genre, decade, ratingMin, ratingMax) {
            return movies.filter(movie => {
                const matchesGenre = !genre || (movie.genre_ids && movie.genre_ids.includes(parseInt(genre)));
                const matchesDecade = !decade || (movie.release_date &&
                    parseInt(movie.release_date.slice(0, 4)) >= parseInt(decade) &&
                    parseInt(movie.release_date.slice(0, 4)) < parseInt(decade) + 10);
                const matchesRating = movie.vote_average >= parseFloat(ratingMin) && movie.vote_average <= parseFloat(ratingMax);
                return matchesGenre && matchesDecade && matchesRating;
            });
        }

        function renderMovies(data) {
            const grid = document.getElementById('movies-grid');
            grid.innerHTML = '';
            if (data.length === 0) {
                grid.innerHTML = '<p style="color:#aaa;padding:1rem">No results found.</p>';
                return;
            }
            data.forEach(movie => {
                const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : '/static/placeholder.jpg';
                const year = movie.release_date ? new Date(movie.release_date).getFullYear() : 'N/A';
                const card = document.createElement('a');
                card.className = 'movie-card';
                card.href = `/movieplayer/movie/${movie.id}`;
                card.innerHTML = `
                    <img src="${posterUrl}" alt="${movie.title}" class="poster">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <div class="year">${year}</div>
                        <p class="overview">${movie.overview || 'No description available.'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let debounceTimer;
        function updateSlider() {
            let lo = parseFloat(document.getElementById('rating-min').value);
            let hi = parseFloat(document.getElementById('rating-max').value);
            if (lo > hi) { lo = hi; document.getElementById('rating-min').value = lo; }
            if (hi < lo) { hi = lo; document.getElementById('rating-max').value = hi; }
            const pct = v => (v / 10) * 100;
            document.getElementById('rating-fill').style.left = pct(lo) + '%';
            document.getElementById('rating-fill').style.width = (pct(hi) - pct(lo)) + '%';
            document.getElementById('rating-display').textContent = `Rating: ${lo.toFixed(1)} – ${hi.toFixed(1)}`;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchMovies, 400);
        }

        document.getElementById('search-button').addEventListener('click', () => fetchMovies(true));
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') fetchMovies(true);
        });
        document.getElementById('genre-filter').addEventListener('change', fetchMovies);
        document.getElementById('decade-filter').addEventListener('change', fetchMovies);
        document.getElementById('rating-min').addEventListener('input', updateSlider);
        document.getElementById('rating-max').addEventListener('input', updateSlider);
        updateSlider();
    </script>
</body>
</html>
