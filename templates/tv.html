<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Show Search</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search TV shows..." required>
        <button id="search-button">Search</button>
    </div>
    
    <div id="shows-grid" class="shows-grid">
        <!-- Results will be inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', function() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            fetch(`/api/search/tv?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('shows-grid');
                    grid.innerHTML = '';
                    data.forEach(show => {
                        const posterUrl = show.poster_path ? `https://image.tmdb.org/t/p/w500${show.poster_path}` : '/static/placeholder.jpg';
                        const year = show.first_air_date ? new Date(show.first_air_date).getFullYear() : 'N/A';
                        const card = document.createElement('a');
                        card.className = 'show-card';
                        card.href = `/tvplayer/tv/${show.id}`;
                        card.innerHTML = `
                            <img src="${posterUrl}" alt="${show.name}" class="poster">
                            <div class="show-info">
                                <h3>${show.name}</h3>
                                <div class="year">${year}</div>
                                <p class="overview">${show.overview || 'No description available.'}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                })
                .catch(error => console.error('Error:', error));
        });
        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('search-button').click();
            }
        });
    </script>
</body>
</html>
