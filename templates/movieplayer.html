<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Player</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <style>
        .source-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .source-btn {
            padding: 8px 16px;
            cursor: pointer;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        .source-btn.active {
            background: #e50914;
        }
    </style>
</head>
<body>
    <div class="movie-player">
        <div class="source-buttons">
            <button class="source-btn active" onclick="setSource('vidking')">Source 1</button>
            <button class="source-btn" onclick="setSource('vidsrc')">Source 2</button>
        </div>
        <iframe
            id="player"
            src="https://www.vidking.net/embed/{{ format }}/{{ media_id }}"
            width="100%"
            height="600"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
    <script>
        const sources = {
            vidking: "https://www.vidking.net/embed/{{ format }}/{{ media_id }}",
            vidsrc: "https://vidsrc-embed.ru/embed/{{ format }}/{{ media_id }}"
        };
        function setSource(key) {
            document.getElementById("player").src = sources[key];
            document.querySelectorAll(".source-btn").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
        }
    </script>
</body>
</html>
