<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Player</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <div class="movie-player">
        <iframe 

            src="https://www.vidking.net/embed/{{ format }}/{{ media_id }}" 
            width="100%" 
            height="600" 
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
